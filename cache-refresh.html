<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Refreshing SkyFire Laser</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f5fafd;
      color: #1b263b;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(90vw, 520px);
      padding: 32px;
      border: 1px solid rgba(27, 38, 59, 0.14);
      background: #ffffff;
      box-shadow: 0 18px 38px rgba(27, 38, 59, 0.1);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.15;
    }

    p {
      margin: 0;
      color: #4f5f73;
      line-height: 1.65;
    }
  </style>
  <link rel="stylesheet" href="/assets/css/utility-template.css?v=20260529-orange1">
</head>
<body>
  <main>
    <h1>Refreshing the site cache...</h1>
    <p>The updated SkyFire Laser homepage will open automatically.</p>
  </main>
  <script>
    (async function refreshSiteCache() {
      try {
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }

        if ('caches' in window) {
          const cacheNames = await caches.keys();
          await Promise.all(cacheNames.map((cacheName) => caches.delete(cacheName)));
        }
      } catch (error) {
        console.warn('Cache refresh failed, continuing to home page.', error);
      } finally {
        window.location.replace('/?fresh=20260514');
      }
    })();
  </script>
</body>
</html>
