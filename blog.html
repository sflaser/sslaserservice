<!DOCTYPE html>

<head>

  <title>Blog | Sky Fire Laser</title>
  <meta name="robots" content="index,follow">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=20260306h">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=20260306h">
  <link rel="shortcut icon" href="/favicon.ico?v=20260306h">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="stylesheet" href="/assets/css/blog-detail.css?v=20260310a">
</head>
<body>
  <main class="blog-shell">
    <header class="blog-topbar">
      <div class="blog-topbar-left">
        <a class="blog-logo" href="/#home" aria-label="Sky Fire Laser home">
          <img src="/images/logos/LOGO长方形.png?v=20260306h" alt="Sky Fire Laser">
        </a>
        <a class="btn-home" href="/#blog">Back to Resources</a>
      </div>
      <nav class="blog-menu" aria-label="Blog navigation">
        <a href="/#home">Home</a>
        <a href="/#services">Services</a>
        <a href="/#applications">Applications</a>
        <a href="/#store">Products</a>
        <a href="/#blog">Resources</a>
        <a href="/#why-us">About</a>
        <a href="/#contact">Contact</a>
      </nav>
    </header>

    <section id="blog-state" class="blog-state">Loading blog post...</section>

    <article id="blog-detail-card" class="blog-card" hidden>
      <div id="blog-cover-frame" class="blog-cover-frame" hidden>
        <img id="blog-cover" class="blog-cover" alt="" hidden>
      </div>
      <div class="blog-content">
        <div id="blog-date" class="blog-date"></div>
        <h1 id="blog-title" class="blog-title"></h1>
        <p id="blog-excerpt" class="blog-excerpt"></p>
        <div id="blog-body" class="blog-body"></div>
      </div>
    </article>
  </main>

  <script src="/assets/js/cms-config.js?v=20260306g"></script>
  <script src="/assets/js/cms-blog-detail.js?v=20260306g"></script>
