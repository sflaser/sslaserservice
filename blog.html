<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog | Sky Fire Laser</title>
  <meta name="robots" content="index,follow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260304c">
  <link rel="alternate icon" type="image/png" href="/images/logos/skyfire-falcon.png?v=20260304c">
  <link rel="stylesheet" href="/assets/css/blog-detail.css">
</head>
<body>
  <main class="blog-shell">
    <header class="blog-topbar">
      <a class="btn-home" href="/#blog">Back to Blog</a>
      <nav class="blog-menu" aria-label="Blog navigation">
        <a href="/#home">Home</a>
        <a href="/#services">Services</a>
        <a href="/#store">Products</a>
        <a href="/#blog">Blog</a>
        <a href="/#contact">Contact</a>
      </nav>
    </header>

    <section id="blog-state" class="blog-state">Loading blog post...</section>

    <article id="blog-detail-card" class="blog-card" hidden>
      <div id="blog-cover-frame" class="blog-cover-frame" hidden>
        <img id="blog-cover" class="blog-cover" alt="" hidden>
      </div>
      <div class="blog-content">
        <div id="blog-date" class="blog-date"></div>
        <h1 id="blog-title" class="blog-title"></h1>
        <p id="blog-excerpt" class="blog-excerpt"></p>
        <div id="blog-body" class="blog-body"></div>
      </div>
    </article>
  </main>

  <script src="/assets/js/cms-config.js"></script>
  <script src="/assets/js/cms-blog-detail.js"></script>
</body>
</html>
